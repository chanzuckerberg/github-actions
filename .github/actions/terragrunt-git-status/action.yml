name: Terragrunt Git Status
description: >
  Manage the apply-gate commit status and auto-merge for the Terragrunt engine.
  Operations:
    gate         — post "pending" if stacks changed, "success" if none (plan caller).
    finalize     — post the aggregate apply result, enable auto-merge on success,
                   and comment on failure (apply caller).
    apply-tg     — parse /apply from an issue_comment, validate write access,
                   approval, and mergeability. Returns approved boolean.
    unlock-tg    — parse /unlock from an issue_comment, validate write access.
                   Returns approved boolean.

inputs:
  operation:
    description: 'One of: gate, finalize, apply-tg, unlock-tg'
    required: true
  stacks:
    description: 'JSON array of stack paths (e.g. ''["terraform/envs/dev"]''). Required for gate and finalize.'
    required: false
    default: '[]'
  status_check_name:
    description: 'Name of the commit status used as the apply merge gate.'
    required: false
    default: terragrunt-apply
  run_result:
    description: >
      Aggregate result of the matrix run (success, failure, cancelled, skipped).
      Required for the finalize operation.
    required: false
    default: ''

outputs:
  all_succeeded:
    description: '"true" if all stacks succeeded, "false" otherwise. Set by finalize.'
  approved:
    description: '"true" if the comment matched and passed validation, "false" otherwise. Set by apply-tg and unlock-tg.'

runs:
  using: node24
  main: dist/index.js
