name: "Docker Build and Push"
description: "Will build and push a docker iamge."
inputs:
  dockerfile:
    description: "Path to the Dockerfile to be built."
    required: true
    default: "Dockerfile"
  context:
    description: "Path to the Docker build context."
    required: true
    default: "."
  name:
    description: "Name of the built docker image."
    required: true
  registry:
    description: "URI for your docker registry. Typically an ECR registry."
    required: true
  build_args:
    description: "A list of build arguments to pass to the docker build."
    required: false
  custom_tag:
    description: "Tag(s) to apply to the built image. If you supply a multi-line string, each line will be applied as a tag."
    required: false
    default: ""
  secret-files:
    description: "A list of files to be copied into the build context."
    required: false
    default: ""
  platforms:
    description: "A list of target platforms for build (comma delimited)"
    required: false
  load:
    description: "Load the image into the Docker daemon"
    required: false
    default: "false"
  extra_cache_branches:
    description: "Comma delimited list of extra cache branches to use after the current branch the build is happening on"
    required: false
    default: ""
  compression:
    description: "Layer compression algorithm (gzip, zstd, estargz, uncompressed). Empty keeps the default (gzip)."
    required: false
    default: ""
  compression_level:
    description: "Compression level (0-9 for gzip/estargz, 0-22 for zstd). Empty keeps the algorithm default."
    required: false
    default: ""
  force_compression:
    description: "Re-compress cached layers with the chosen algorithm (true/false). Empty keeps the default (false)."
    required: false
    default: ""
outputs:
  tags:
    description: "The tags we built and pushed"
    value: ${{ steps.meta.outputs.tags }}
  json:
    description: "The tags JSON we built and pushed"
    value: ${{ steps.meta.outputs.json }}
runs:
  using: "composite"
  steps:
    - name: Login to ECR
      uses: docker/login-action@v4
      with:
        registry: 533267185808.dkr.ecr.us-west-2.amazonaws.com
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
      with:
        image: 533267185808.dkr.ecr.us-west-2.amazonaws.com/docker.io/central/tonistiigi/binfmt:qemu-v10.0.4-56
        cache-image: false
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: |
          image=533267185808.dkr.ecr.us-west-2.amazonaws.com/docker.io/central/moby/buildkit:v0.25.0
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ inputs.registry }}/${{ inputs.name }}
        tags: |
          type=ref,event=branch,prefix=branch-
          type=ref,event=pr,prefix=pr-
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=sha-
          type=sha,format=long,prefix=sha-
          ${{ inputs.custom_tag }}
    - name: Login to ECR
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry }}
    - name: Calculate Branch and Base Names
      id: refs
      uses: chanzuckerberg/github-actions/.github/actions/get-github-ref-names@v6
    - name: Calculate cache-to and cache-from
      id: cache
      uses: actions/github-script@v8
      env:
        EXTRA_CACHE_BRANCHES: ${{ inputs.extra_cache_branches }}
      with:
        script: |
          let caches = [
            "${{ steps.refs.outputs.headRef }}",
            ...process.env.EXTRA_CACHE_BRANCHES.split(",").filter(Boolean),
          ]
          .map(ref => ref.replaceAll(/[^a-zA-Z0-9-_\.]+/g, "-"))
          .map(ref => `type=registry,ref=${{ inputs.registry }}/${{ inputs.name }}:cache-branch-${ref}`);

          console.log(`Will use cached images from ${JSON.stringify(caches, null, 2)}`);

          if (caches.length === 0) {
            throw new Error("No cache branches found");
          }
          core.setOutput("cacheFrom", caches.join('\r\n'));
          core.setOutput("cacheTo", caches[0])
    - name: Compute image output
      id: output
      shell: bash
      env:
        COMPRESSION: ${{ inputs.compression }}
        COMPRESSION_LEVEL: ${{ inputs.compression_level }}
        FORCE_COMPRESSION: ${{ inputs.force_compression }}
      run: |
        out="type=image,push=true"
        if [[ -n "$COMPRESSION" ]]; then
          out="${out},compression=${COMPRESSION}"
          if [[ -n "$COMPRESSION_LEVEL" ]]; then
            out="${out},compression-level=${COMPRESSION_LEVEL}"
          fi
          if [[ "$FORCE_COMPRESSION" == "true" ]]; then
            out="${out},force-compression=true"
          fi
        fi
        echo "spec=${out}" >> "$GITHUB_OUTPUT"
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        file: ${{ inputs.dockerfile }}
        context: ${{ inputs.context }}
        outputs: ${{ steps.output.outputs.spec }}
        load: ${{ inputs.load }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: |
          ${{ steps.cache.outputs.cacheFrom }}
        cache-to: |
          ${{ steps.cache.outputs.cacheTo }},mode=max
        build-args: |
          ${{ inputs.build_args }}
        secret-files: ${{ inputs.secret-files }}
        platforms: ${{ inputs.platforms }}
