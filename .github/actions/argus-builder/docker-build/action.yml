name: argus-docker-build
description: Build a Docker Image for Argus

inputs:
  image_name:
    description: "Name of the image to build"
    required: true
  dockerfile:
    description: "Path to the Dockerfile"
    required: true
  context:
    description: "Path to the build context"
    required: true
  platform:
    description: "Platform to build for"
    required: false
    default: "linux/arm64"
  build_args:
    description: "Args for docker build"
    required: false
    default: ""
  secret_files:
    description: "Files to copy into the build context"
    required: false
    default: ""
  image_tag:
    description: "Primary tag to apply to the built image"
    required: true
  additional_tags:
    description: "Extra tags (newline-delimited) to push on this image in addition to image_tag"
    required: false
    default: ""
  commit_sha:
    description: "Full commit SHA passed as COMMIT_SHA build arg"
    required: false
    default: ""
  github_app_id:
    description: "GitHub App ID"
    required: true
  github_private_key:
    description: "GitHub App private key"
    required: true
  clean_checkout:
    description: "Whether to clean the repository before checking out"
    required: false
    default: "false"
  fail_on_vulnerabilities:
    description: "DEPRECATED"
    required: false
    default: "true"
  enable_vuln_container_scan:
    description: "DEPRECATED"
    required: false
    default: "false"

outputs:
  image_uri:
    description: "URI of the image that was built"
    value: ${{ steps.ecr_metadata.outputs.IMAGE_URI }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        clean: ${{ inputs.clean_checkout }}
        fetch-depth: 1
        path: ${{ github.event.repository.name }}
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-region: us-west-2
        role-to-assume: arn:aws:iam::533267185808:role/gh_actions_core_platform_infra_prod_eks
        role-session-name: ArgusContainerBuilder
    - name: Generate token
      uses: actions/create-github-app-token@v3
      id: generate_token
      with:
        app-id: ${{ inputs.github_app_id }}
        private-key: ${{ inputs.github_private_key }}
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
        repository: chanzuckerberg/argus-artifacts
        path: argus-artifacts
        token: ${{ steps.generate_token.outputs.token }}
    - name: ECR Metadata
      id: ecr_metadata
      uses: actions/github-script@v8
      with:
        script: |
          const path = require('path');
          const ECR_REGISTRY = "533267185808.dkr.ecr.us-west-2.amazonaws.com";
          const ECR_REPO_NAME = path.join(
            'core-platform',
            '${{ github.event.repository.name }}',
            '${{ inputs.context }}',
            '${{ inputs.image_name }}',
          ).toLowerCase();

          // inputs.image_tag can be a multi-line string so we split on newlines and take the first non-empty line
          const inputTagLines = `${{ inputs.image_tag }}`.split('\n').map(line => line.trim()).filter(line => line.length > 0);
          if (inputTagLines.length === 0) {
            throw new Error("inputs.image_tag must contain at least one non-empty line");
          }
          if (inputTagLines.length > 1) {
            console.warn(`inputs.image_tag contains multiple non-empty lines, using the first one: ${inputTagLines[0]}`);
          }

          const IMAGE_URI = `${ECR_REGISTRY}/${ECR_REPO_NAME}:${inputTagLines[0]}`;

          core.setOutput('ECR_REGISTRY', ECR_REGISTRY);
          core.setOutput('ECR_REPO_NAME', ECR_REPO_NAME);
          core.setOutput('IMAGE_TAG', inputTagLines[0]);
          core.setOutput('IMAGE_URI', IMAGE_URI);
    - name: Create ECR repo if necessary
      id: create_ecr_repo
      uses: chanzuckerberg/github-actions/.github/actions/create-ecr-repository@v6
      with:
        repository: ${{ steps.ecr_metadata.outputs.ECR_REPO_NAME }}
        lifecycle-policy: argus-artifacts/settings/ecr/lifecycle-policy.json
        repository-policy: argus-artifacts/settings/ecr/repository-policy.json
    - name: Find Release Please Branches
      id: release-please-branches
      shell: bash
      working-directory: ${{ github.event.repository.name }}
      run: |
        RELEASE_PLEASE_BRANCHES=$(git ls-remote --heads origin 'release-please*' | awk -F'/' '{print $NF}' | tr '\n' ',' || true)
        echo "RELEASE_PLEASE_BRANCHES=${RELEASE_PLEASE_BRANCHES}" >> $GITHUB_OUTPUT
    - name: Build And Push
      uses: chanzuckerberg/github-actions/.github/actions/docker-build-push@CCIE-6501-implement-new-reusable-argus-docker-builder-in-github-actions
      with:
        dockerfile: ${{ github.event.repository.name }}/${{ inputs.dockerfile }}
        context: ${{ github.event.repository.name }}/${{ inputs.context }}
        name: ${{ steps.ecr_metadata.outputs.ECR_REPO_NAME }}
        registry: ${{ steps.ecr_metadata.outputs.ECR_REGISTRY }}
        custom_tag: |
          ${{ inputs.image_tag }}
          ${{ inputs.additional_tags }}
        platforms: ${{ inputs.platform }}
        build_args: |
          IMAGE_TAG=${{ inputs.image_tag }}
          COMMIT_SHA=${{ inputs.commit_sha }}
          ${{ inputs.build_args }}
        secret-files: ${{ inputs.secret_files }}
        load: "false"
        extra_cache_branches: ${{ steps.release-please-branches.outputs.RELEASE_PLEASE_BRANCHES }}
    - name: Job summary
      uses: actions/github-script@v9
      env:
        IMAGE_NAME: ${{ inputs.image_name }}
        IMAGE_TAG: ${{ inputs.image_tag }}
        IMAGE_URI: ${{ steps.ecr_metadata.outputs.IMAGE_URI }}
        ADDITIONAL_TAGS: ${{ inputs.additional_tags }}
      with:
        script: |
          const baseTag = process.env.IMAGE_TAG;
          const additionalTags = (process.env.ADDITIONAL_TAGS || '')
            .split('\n').map(t => t.trim()).filter(Boolean);

          const rows = [[baseTag, 'default', process.env.IMAGE_URI]];
          for (const tag of additionalTags) {
            const env = tag.startsWith(baseTag + '-') ? tag.slice(baseTag.length + 1) : '';
            rows.push([tag, env || '-', `${process.env.IMAGE_URI.replace(':' + baseTag, ':' + tag)}`]);
          }

          const s = core.summary.addHeading('Image Built', 2);
          s.addHeading(process.env.IMAGE_NAME, 3);
          s.addTable([
            [
              { data: 'Tag', header: true },
              { data: 'Target', header: true },
              { data: 'Image URI', header: true },
            ],
            ...rows.map(r => [r[0], r[1], r[2]]),
          ]);
          if (additionalTags.length > 0) {
            s.addRaw('\nTo deploy manually, edit `.infra/{env}/values.yaml` with the matching env-specific tag and open a PR.');
          } else {
            s.addRaw('\nTo deploy manually, edit `.infra/{env}/values.yaml` with this tag and open a PR.');
          }
          await s.write();
