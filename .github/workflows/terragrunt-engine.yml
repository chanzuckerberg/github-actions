name: Terragrunt Engine

# Reusable Terragrunt plan/apply engine. Repos call this with a thin caller
# workflow (see chanzuckerberg/argus-infra-stacks for the reference).

on:
  workflow_call:
    inputs:
      action:
        description: 'Passed to `terragrunt run --all -- <action>` (e.g. "plan -lock=false" or "apply").'
        required: true
        type: string
      all_stacks:
        description: "Run on every stack rather than only the changed ones."
        required: false
        type: boolean
        default: false
      runner:
        description: "runs-on label for the jobs."
        required: false
        type: string
        default: amd64
      aws_region:
        description: "AWS region for credential configuration."
        required: false
        type: string
        default: us-west-2
      ci_role_arn:
        description: "IAM role the engine assumes to run Terragrunt (OIDC). Defaults to the fleet-wide argus-infra-stacks CI role."
        required: false
        type: string
        default: arn:aws:iam::416703108729:role/argus-infra-stacks-ci
      cache_role_arn:
        description: "IAM role (assumed via role chaining) for the provider-cache S3 bucket and lock cleanup. Defaults to the fleet-wide argus tfe-si role."
        required: false
        type: string
        default: arn:aws:iam::533267185808:role/tfe-si
      provider_cache_bucket:
        description: "S3 bucket holding the shared Terraform provider cache tarball. Defaults to the fleet-wide argus bucket."
        required: false
        type: string
        default: core-platform-infra-prod-prod-argus-infra-stacks-state
      terraform_version:
        description: "Terraform version to install."
        required: false
        type: string
        default: 1.9.8
      terragrunt_version:
        description: "Terragrunt release tag (gruntwork-io/terragrunt)."
        required: false
        type: string
        default: v1.0.0
      stack_paths:
        description: |
          Newline-separated list of base paths to discover stacks under. A stack is one
          directory below each base path. Defaults to the fogg layout.
        required: false
        type: string
        default: |
          terraform/envs
          terraform/accounts
      claim_authority:
        description: >
          If true, claim authority for each stack before applying. Fails the job if
          a stack is owned by another PR. Used by the /apply-and-merge workflow.
        required: false
        type: boolean
        default: false
      skip_pr_owned:
        description: >
          Read each stack's authority record before running. For apply actions, skip
          any stack owned by a PR (with a warning). For plan actions, annotate but
          always proceed. Safe to leave on — plans are never blocked.
        required: false
        type: boolean
        default: true
      release_authority:
        description: >
          If true, release authority (reset to main) for each stack after a successful
          apply. Used by the /apply-and-merge workflow after all stacks succeed.
        required: false
        type: boolean
        default: false
      auto_merge_on_success:
        description: >
          If true, a finalize job runs after all matrix legs complete. On full success
          it posts a green commit status, releases authority for all stacks, and enables
          GitHub native auto-merge on the PR. On any failure it posts a red status and
          comments on the PR. Used by the /apply-and-merge workflow.
        required: false
        type: boolean
        default: false
      set_apply_gate:
        description: >
          If true, set the apply-gate commit status right after stack discovery.
          Posts "pending" if stacks changed (merge blocked until /apply-and-merge succeeds) or
          "success" if none changed (docs-only PRs pass through). Used by the plan workflow.
        required: false
        type: boolean
        default: false
      status_check_name:
        description: "Name of the commit status used as the apply merge gate."
        required: false
        type: string
        default: terragrunt-apply
      authority_table:
        description: "DynamoDB table for authority records. Defaults to the shared fleet-wide state-lock table."
        required: false
        type: string
        default: core-platform-infra-prod-prod-argus-infra-stacks-state-lock
    # Callers should use `secrets: inherit` to pass org/repo secrets by convention.
    # The engine discovers secrets by naming convention:
    #   - SHARED_INFRA_DEPLOY_KEY - org-wide shared-infra deploy key (required)
    #   - EXTRA_DEPLOY_KEYS - additional per-repo deploy keys (optional)
    #   - TERRAGRUNT_BOT_APP_ID, TERRAGRUNT_BOT_PK - org-wide GitHub App (required)
    #   - TF_ENV_<NAME> - exported as env <NAME> (provider SDK credentials)
    #   - TF_VAR_<name> - exported as-is (Terraform input variables)
    secrets:
      TERRAGRUNT_BOT_APP_ID:
        description: "GitHub App ID for the terragrunt-bot token (org-wide secret)."
        required: false
      TERRAGRUNT_BOT_PK:
        description: "GitHub App private key for the terragrunt-bot token (org-wide secret)."
        required: false
      SHARED_INFRA_DEPLOY_KEY:
        description: "ssh-agent key for fetching private Terraform modules (org-wide secret)."
        required: false
      EXTRA_DEPLOY_KEYS:
        description: "Additional ssh-agent keys (newline-separated PEMs) for repos needing more than the shared key."
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  validate-comment:
    runs-on: ${{ inputs.runner }}
    if: ${{ github.event_name == 'issue_comment' }}
    timeout-minutes: 5
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.TERRAGRUNT_BOT_APP_ID }}
          private-key: ${{ secrets.TERRAGRUNT_BOT_PK }}
      - name: Validate /apply-and-merge comment
        uses: chanzuckerberg/github-actions/.github/actions/terragrunt-git-status@heathj/fix-set-apply-gate
        with:
          operation: validate-apply
          github_token: ${{ steps.generate_token.outputs.token }}

  find-changed-stacks:
    runs-on: ${{ inputs.runner }}
    needs: validate-comment
    if: ${{ !cancelled() && (needs.validate-comment.result == 'success' || needs.validate-comment.result == 'skipped') }}
    outputs:
      stacks: ${{ steps.stacks.outputs.stacks }}
    timeout-minutes: 10
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.TERRAGRUNT_BOT_APP_ID }}
          private-key: ${{ secrets.TERRAGRUNT_BOT_PK }}
      - uses: actions/checkout@v6
      - name: Resolve stacks
        id: stacks
        uses: chanzuckerberg/github-actions/.github/actions/terragrunt-changed-stacks@heathj/fix-set-apply-gate
        with:
          stack_paths: ${{ inputs.stack_paths }}
          all_stacks: ${{ inputs.all_stacks }}
          github_token: ${{ steps.generate_token.outputs.token }}

  set-apply-gate:
    runs-on: ${{ inputs.runner }}
    needs:
      - find-changed-stacks
      - validate-comment
    if: >-
      !cancelled() &&
      inputs.set_apply_gate &&
      (needs.validate-comment.result == 'success' || needs.validate-comment.result == 'skipped') &&
      needs.find-changed-stacks.result == 'success' &&
      needs.find-changed-stacks.outputs.stacks != '[]'
    timeout-minutes: 5
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.TERRAGRUNT_BOT_APP_ID }}
          private-key: ${{ secrets.TERRAGRUNT_BOT_PK }}
      - name: Set apply gate
        uses: chanzuckerberg/github-actions/.github/actions/terragrunt-git-status@heathj/fix-set-apply-gate
        with:
          operation: gate
          stacks: ${{ needs.find-changed-stacks.outputs.stacks }}
          status_check_name: ${{ inputs.status_check_name }}
          github_token: ${{ steps.generate_token.outputs.token }}

  run-all:
    runs-on: ${{ inputs.runner }}
    needs: [validate-comment, find-changed-stacks]
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.find-changed-stacks.outputs.stacks) }}
    if: >-
      !cancelled() &&
      (needs.validate-comment.result == 'success' || needs.validate-comment.result == 'skipped') &&
      needs.find-changed-stacks.result == 'success' &&
      needs.find-changed-stacks.outputs.stacks != '[]'
    env:
      TG_PROVIDER_CACHE: "1"
      TG_PROVIDER_CACHE_DIR: /tmp/terragrunt-provider-cache
      # Cache key is always derived from the calling repo: terraform/<owner>/<repo>/...
      PROVIDER_CACHE_KEY: ${{ format('terraform/{0}/provider-cache/providers.tar.gz', github.repository) }}
    steps:
      - name: Github SSH known hosts
        run: |
          mkdir -p ~/.ssh/
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts
      # TODO: requiring a per-repo SSH deploy key just to fetch private Terraform
      # modules is painful to set up for every adopting repo. Replace this with a
      # better mechanism (e.g. a GitHub App token scoped to read the module repos,
      # or a shared modules source) so onboarding does not need per-repo SSH keys.
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          # ssh-agent loads newline-separated keys: the shared deploy key plus
          # any extra per-repo keys. An absent secret expands to an empty line,
          # which the action ignores.
          ssh-private-key: |
            ${{ secrets.SHARED_INFRA_DEPLOY_KEY }}
            ${{ secrets.EXTRA_DEPLOY_KEYS }}
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.TERRAGRUNT_BOT_APP_ID }}
          private-key: ${{ secrets.TERRAGRUNT_BOT_PK }}
      - name: Get Base Git Ref
        id: ref
        uses: chanzuckerberg/github-actions/.github/actions/get-github-ref-names@get-github-ref-names-v1
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.headRef || 'refs/heads/main' }}
          token: ${{ steps.generate_token.outputs.token || github.token }}
      # OIDC entry point: establishes CI-role credentials in the environment.
      # The cache-role step below uses role-chaining to assume the cache role
      # FROM these credentials (the cache role is not assumable via OIDC
      # directly), so this step is required even though the CI role is
      # re-assumed again after the provider-cache steps for the Terragrunt run.
      - name: Configure AWS credentials (CI base role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.ci_role_arn }}
          role-session-name: TerragruntEngine
      - name: Install Terragrunt
        uses: jaxxstorm/action-install-gh-release@v3.0.0
        with:
          repo: gruntwork-io/terragrunt
          tag: ${{ inputs.terragrunt_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          extension-matching: disable
          rename-to: terragrunt
          chmod: 0755
          cache: enable
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
          terraform_version: ${{ inputs.terraform_version }}
      - name: Install AWS CLI
        uses: chanzuckerberg/github-actions/.github/actions/install-aws-cli@install-aws-cli-v0
      - name: Configure AWS credentials (cache role, role chaining)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.cache_role_arn }}
          role-chaining: true
          role-session-name: TerragruntEngineCache
      - name: Restore Provider Cache from S3
        uses: chanzuckerberg/github-actions/.github/actions/terragrunt-provider-cache@terragrunt-provider-cache-v0
        with:
          operation: restore
          provider-cache-bucket: ${{ inputs.provider_cache_bucket }}
          provider-cache-key: ${{ env.PROVIDER_CACHE_KEY }}
          cache-dir: ${{ env.TG_PROVIDER_CACHE_DIR }}
          stack-root: ${{ matrix.stack }}
      - name: Check stack authority
        id: authority
        if: ${{ inputs.skip_pr_owned }}
        uses: chanzuckerberg/github-actions/.github/actions/terragrunt-stack-authority@heathj/fix-set-apply-gate
        with:
          operation: read
          stacks: ${{ format('["{0}"]', matrix.stack) }}
          skip_if_owned: ${{ contains(inputs.action, 'apply') }}
          authority_table: ${{ inputs.authority_table }}
          aws_region: ${{ inputs.aws_region }}
      - name: Claim stack authority
        id: authority_claim
        if: ${{ (inputs.claim_authority || github.event_name == 'issue_comment') && (steps.authority.outputs.proceed != 'false') }}
        uses: chanzuckerberg/github-actions/.github/actions/terragrunt-stack-authority@heathj/fix-set-apply-gate
        with:
          operation: claim
          stacks: ${{ format('["{0}"]', matrix.stack) }}
          authority_table: ${{ inputs.authority_table }}
          aws_region: ${{ inputs.aws_region }}
      - name: Configure AWS credentials (CI base role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.ci_role_arn }}
          role-session-name: TerragruntEngine
          unset-current-credentials: true
      - name: export terraform provider secrets
        if: ${{ steps.authority.outputs.proceed != 'false' }}
        uses: chanzuckerberg/github-actions/.github/actions/terragrunt-provider-secrets@terragrunt-provider-secrets-v0
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
      - name: Terragrunt ${{ inputs.action }}
        working-directory: ${{ matrix.stack }}
        id: tgaction
        if: ${{ steps.authority.outputs.proceed != 'false' }}
        timeout-minutes: 90
        run: |
          # Pipefail ensures that a terragrunt failure is reported by the Github Action.
          # Without it, the `tee` exit code always succeeds and the action looks green.
          set -eo pipefail
          echo "current_env=$(basename '${{ matrix.stack }}')" >> "$GITHUB_OUTPUT"
          echo "action_trimmed=$(echo '${{ inputs.action }}' | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

          # '2> >(tee err.txt >&2)' captures stderr, writes it to err.txt AND pipes it back to stderr for the gha console.
          terragrunt run --all --non-interactive -- ${{ inputs.action }} -no-color 2> >(tee err.txt >&2) | tee out.txt
          cat out.txt && cat err.txt
      - name: Store Outputs
        uses: actions/upload-artifact@v7
        id: store
        if: ${{ (success() || failure()) && steps.authority.outputs.proceed != 'false' }}
        with:
          name: ${{ steps.tgaction.outputs.current_env }}-${{ steps.tgaction.outputs.action_trimmed }}-${{ github.sha }}
          path: |
            ${{ matrix.stack }}/*.txt
      - name: Configure AWS credentials (cache role, cleanup, role chaining)
        if: always()
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.cache_role_arn }}
          role-chaining: true
          role-session-name: TerragruntEngineCleanup
      - name: Release stack authority
        if: ${{ inputs.release_authority && !inputs.auto_merge_on_success && github.event_name != 'issue_comment' && steps.tgaction.outcome == 'success' && steps.authority.outputs.proceed != 'false' }}
        uses: chanzuckerberg/github-actions/.github/actions/terragrunt-stack-authority@heathj/fix-set-apply-gate
        with:
          operation: release
          stacks: ${{ format('["{0}"]', matrix.stack) }}
          authority_table: ${{ inputs.authority_table }}
          aws_region: ${{ inputs.aws_region }}
      - name: Upload Provider Cache to S3
        if: always()
        uses: chanzuckerberg/github-actions/.github/actions/terragrunt-provider-cache@terragrunt-provider-cache-v0
        with:
          operation: upload
          provider-cache-bucket: ${{ inputs.provider_cache_bucket }}
          provider-cache-key: ${{ env.PROVIDER_CACHE_KEY }}
          cache-dir: ${{ env.TG_PROVIDER_CACHE_DIR }}
      - name: Release Terragrunt Locks (Cleanup)
        if: always()
        uses: chanzuckerberg/github-actions/.github/actions/terragrunt-release-locks@terragrunt-release-locks-v0
        with:
          stack-root: ${{ matrix.stack }}

  finalize:
    runs-on: ${{ inputs.runner }}
    needs: [validate-comment, find-changed-stacks, run-all]
    if: >-
      always() &&
      (needs.validate-comment.result == 'success' || needs.validate-comment.result == 'skipped') &&
      needs.find-changed-stacks.result == 'success' &&
      needs.find-changed-stacks.outputs.stacks != '[]' &&
      (inputs.auto_merge_on_success || github.event_name == 'issue_comment')
    timeout-minutes: 10
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.TERRAGRUNT_BOT_APP_ID }}
          private-key: ${{ secrets.TERRAGRUNT_BOT_PK }}
      - name: Configure AWS credentials (CI base role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.ci_role_arn }}
          role-session-name: TerragruntEngineFinalize
      - name: Configure AWS credentials (cache role, role chaining)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.cache_role_arn }}
          role-chaining: true
          role-session-name: TerragruntEngineFinalizeCache
      - name: Post status and finalize
        id: result
        uses: chanzuckerberg/github-actions/.github/actions/terragrunt-git-status@heathj/fix-set-apply-gate
        with:
          operation: finalize
          stacks: ${{ needs.find-changed-stacks.outputs.stacks }}
          status_check_name: ${{ inputs.status_check_name }}
          run_result: ${{ needs.run-all.result }}
          github_token: ${{ steps.generate_token.outputs.token }}
      - name: Release authority (all stacks)
        if: ${{ steps.result.outputs.all_succeeded == 'true' }}
        uses: chanzuckerberg/github-actions/.github/actions/terragrunt-stack-authority@heathj/fix-set-apply-gate
        with:
          operation: release
          stacks: ${{ needs.find-changed-stacks.outputs.stacks }}
          authority_table: ${{ inputs.authority_table }}
          aws_region: ${{ inputs.aws_region }}
